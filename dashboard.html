<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard — Platinum Bank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<nav class="navbar navbar-dark">
<div class="container">

<a class="navbar-brand">Platinum Bank</a>

<div>
<span class="text-white me-3" id="username">John Smith</span>
<button class="btn btn-light btn-sm" id="logoutBtn">Logout</button>
</div>

</div>
</nav>

<div class="container mt-4">

<div class="card balance-card mb-4">
<div class="card-body p-4">

<h3>Current Balance</h3>
<h1 id="balance">R0.00</h1>

<div class="quick-actions">
<button class="btn btn-success" onclick="depositMoney()">💰 Deposit</button>
<button class="btn btn-danger" onclick="withdrawMoney()">📤 Withdraw</button>
<button class="btn btn-primary" onclick="transferMoney()">🔁 Transfer</button>
</div>

</div>
</div>

<div class="row g-4">

<div class="col-md-6">
<div class="card h-100">
<div class="card-body p-4">

<h4>Account Information</h4>
<hr>
<p><strong>Account Number:</strong> <span id="accountNumber"></span></p>
<p><strong>Account Type:</strong> Savings</p>
<p><strong>Status:</strong> Active</p>

</div>
</div>
</div>

<div class="col-md-6">
<div class="card h-100">
<div class="card-body p-4">

<h4>Recent Transactions</h4>
<hr>

<table class="table">
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Amount</th>
</tr>
</thead>
<tbody id="transactionTable">
</tbody>
</table>

</div>
</div>
</div>

</div>

<footer class="site-footer mt-4">
&copy; 2026. Created by Lona Smith in the Republic of South Africa &middot; lonasmithhq@gmail.com
</footer>

</div>

<script src="dashboard.js"></script>

</body>
</html>
